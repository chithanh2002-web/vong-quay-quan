<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay Chọn Quán - Nhóm Ăn Trưa</title>
    <style>
        :root {
            --bg-color: #0b2317;
            --gold-color: #d4af37;
            --gold-light: #f3e5ab;
            --box-bg: rgba(255, 255, 255, 0.05);
            --box-border: rgba(212, 175, 55, 0.3);
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            color: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 12px;
            letter-spacing: 2px;
            color: var(--gold-color);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            color: var(--gold-light);
        }

        .description {
            font-size: 13px;
            color: #b0b0b0;
            max-width: 400px;
            line-height: 1.4;
        }

        .input-container {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 360px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            background: var(--box-bg);
            border: 1px solid var(--box-border);
            border-radius: 8px;
            padding: 10px 15px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: #777;
        }

        button {
            background: linear-gradient(to bottom, #e6c65c, #b8860b);
            border: none;
            border-radius: 8px;
            color: #111;
            font-weight: bold;
            padding: 0 15px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        .players-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 360px;
            margin-bottom: 20px;
        }

        .player-card {
            background: var(--box-bg);
            border: 1px solid var(--box-border);
            border-radius: 10px;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .player-card.active-turn {
            border-color: var(--gold-light);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .player-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .player-status {
            font-size: 11px;
            color: #888;
        }

        .wheel-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin-bottom: 20px;
        }

        .pointer {
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 14px solid #e74c3c;
            z-index: 10;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid var(--gold-color);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: transform 4s cubic-bezier(0.15, 0.9, 0.2, 1);
            background: #222;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .wheel-inner {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .section {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
        }

        .section-1 { top: 0; left: 0; transform: rotate(0deg); background: #2e5a36; }
        .section-2 { top: 0; left: 50%; transform: rotate(90deg); background: #5a422e; }
        .section-3 { top: 50%; left: 50%; transform: rotate(180deg); background: #333333; }
        .section-4 { top: 50%; left: 0; transform: rotate(270deg); background: #42382e; }

        .wheel-center {
            position: absolute;
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            border: 2px solid var(--gold-color);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: var(--gold-light);
            text-align: center;
            z-index: 2;
        }

        .spin-btn {
            width: 100%;
            max-width: 360px;
            padding: 14px;
            background: linear-gradient(to bottom, #333, #222);
            border: 1px solid var(--box-border);
            border-radius: 10px;
            color: var(--gold-light);
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            margin-bottom: 15px;
        }

        .footer-note {
            font-size: 11px;
            color: #777;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="subtitle">Nhóm Ăn Trưa</div>
        <h1>Vòng Quay Chọn Quán</h1>
        <div class="description">112 hay Hương Lúa? Mỗi người chọn tên mình rồi quay – chống spam F5, mỗi người đúng 1 lượt!</div>
    </header>

    <div class="input-container">
        <input type="text" id="newNameInput" placeholder="Nhập tên người chơi mới...">
        <button onclick="addPlayer()">+ Thêm</button>
    </div>

    <div class="players-grid" id="playersGrid"></div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div class="wheel" id="wheel">
            <div class="wheel-inner">
                <div class="section section-1">Hương Lúa</div>
                <div class="section section-2">112</div>
                <div class="section section-3">Hương Lúa</div>
                <div class="section section-4">112</div>
            </div>
        </div>
        <div class="wheel-center">QUÁN</div>
    </div>

    <button class="spin-btn" onclick="spinWheel()">Chọn tên trước đã</button>

    <div class="footer-note">
        ⚖️ Tỉ lệ quay hoàn toàn ngẫu nhiên và bảo mật chống F5
    </div>

    <script>
        let players = [
            { name: 'Kiệt', spun: true },
            { name: 'Quý', spun: true },
            { name: 'Vương', spun: true },
            { name: 'Huy', spun: true },
            { name: 'Tra', spun: true },
            { name: 'Thành', spun: false }
        ];

        function renderPlayers() {
            const grid = document.getElementById('playersGrid');
            grid.innerHTML = '';
            players.forEach((player, index) => {
                const card = document.createElement('div');
                card.className = `player-card ${!player.spun && index === players.length - 1 ? 'active-turn' : ''}`;
                card.innerHTML = `
                    <div class="player-name">${player.name}</div>
                    <div class="player-status">${player.spun ? 'đã quay' : 'chưa quay'}</div>
                `;
                grid.appendChild(card);
            });
        }

        function addPlayer() {
            const input = document.getElementById('newNameInput');
            const name = input.value.trim();
            if (name) {
                players.push({ name: name, spun: false });
                input.value = '';
                renderPlayers();
            }
        }

        function spinWheel() {
            const wheel = document.getElementById('wheel');
            const randomDegree = Math.floor(Math.random() * 3600) + 720;
            wheel.style.transform = `rotate(${randomDegree}deg)`;
            setTimeout(() => {
                alert("Đã quay xong! Quyết định cuối cùng thuộc về vòng quay.");
            }, 4000);
        }

        renderPlayers();
    </script>
</body>
</html>
