<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vòng Quay Chọn Quán - Theo Phòng</title>
    <style>
        :root {
            --bg-color: #0b2317;
            --gold-color: #d4af37;
            --gold-light: #f3e5ab;
            --box-bg: rgba(255, 255, 255, 0.05);
            --box-border: rgba(212, 175, 55, 0.3);
        }
        body {
            margin: 0; padding: 20px;
            background-color: var(--bg-color);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            color: #fff; text-align: center;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .room-badge {
            background: rgba(212, 175, 55, 0.2);
            border: 1px solid var(--gold-color);
            padding: 8px 15px; border-radius: 20px;
            display: inline-block; margin-bottom: 15px;
            color: var(--gold-light); font-weight: bold;
        }
        h1 { color: var(--gold-color); font-size: 24px; margin-bottom: 5px; }
        p { font-size: 14px; color: #ccc; margin-bottom: 20px; }
        .input-box {
            display: flex; gap: 10px; margin-bottom: 20px;
        }
        input {
            flex: 1; padding: 12px; border-radius: 8px;
            border: 1px solid var(--box-border);
            background: var(--box-bg); color: #fff; font-size: 16px;
        }
        button {
            padding: 12px 20px; border-radius: 8px;
            border: none; background: var(--gold-color);
            color: #000; font-weight: bold; cursor: pointer;
        }
        .player-list {
            display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px;
        }
        .player-item {
            background: var(--box-bg); border: 1px solid var(--box-border);
            padding: 10px 15px; border-radius: 8px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .wheel-container {
            position: relative; width: 280px; height: 280px; margin: 20px auto;
        }
        canvas { width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--gold-color); }
        .spin-btn {
            width: 100%; padding: 15px; font-size: 18px;
            background: linear-gradient(to bottom, #f3e5ab, #d4af37);
            border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }
        .footer-link {
            margin-top: 30px; font-size: 13px; color: var(--gold-light); cursor: pointer; text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <div style="font-size: 12px; color: #888; text-transform: uppercase;">Nhóm Ăn Trưa</div>
    <h1>Vòng Quay Chọn Quán</h1>
    <div class="room-badge" id="roomDisplay">Mã Phòng: Đang tải...</div>
    <p>Mỗi nhóm Zalo dùng một tên phòng riêng để không bị đụng dữ liệu hoặc phá phách!</p>

    <div class="input-box">
        <input type="text" id="playerName" placeholder="Nhập tên người chơi...">
        <button onclick="addPlayer()">+ Thêm</button>
    </div>

    <div class="player-list" id="playerList"></div>

    <div class="wheel-container">
        <canvas id="wheel" width="300" height="300"></canvas>
    </div>

    <button class="spin-btn" onclick="spinWheel()">Quay Vòng Ngay</button>

    <div class="footer-link" onclick="changeRoom()">🔄 Đổi sang phòng/nhóm khác</div>
</div>

<script>
    // Tự động nhận diện phòng từ URL (?room=ten_phong)
    const urlParams = new URLSearchParams(window.location.search);
    let currentRoom = urlParams.get('room') || 'mac-dinh';
    document.getElementById('roomDisplay').innerText = "Mã Phòng: " + currentRoom;

    // Khởi tạo dữ liệu riêng biệt cho từng phòng qua localStorage
    const storageKey = 'vongquay_' + currentRoom;
    let data = JSON.parse(localStorage.getItem(storageKey)) || {
        players: [
            { name: "Kiệt", status: "chưa quay" },
            { name: "Quý", status: "chưa quay" },
            { name: "Vương", status: "chưa quay" }
        ],
        restaurants: ["Hương Lúa", "QUÁN"]
    };

    function saveData() {
        localStorage.setItem(storageKey, JSON.stringify(data));
    }

    function render() {
        const listEl = document.getElementById('playerList');
        listEl.innerHTML = '';
        data.players.forEach((p, index) => {
            listEl.innerHTML += `
                <div class="player-item">
                    <span><b>${p.name}</b></span>
                    <span style="color: ${p.status === 'chưa quay' ? '#aaa' : '#d4af37'}">${p.status}</span>
                </div>
            `;
        });
        drawWheel();
    }

    function addPlayer() {
        const input = document.getElementById('playerName');
        const name = input.value.trim();
        if(name) {
            data.players.push({ name: name, status: "chưa quay" });
            input.value = '';
            saveData();
            render();
        }
    }

    function changeRoom() {
        let newRoom = prompt("Nhập tên phòng mới cho nhóm (không dấu, không khoảng cách):", currentRoom);
        if(newRoom) {
            newRoom = newRoom.toLowerCase().replace(/[^a-z0-9]/g, '-');
            window.location.href = window.location.pathname + '?room=' + newRoom;
        }
    }

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    function drawWheel() {
        const restaurants = data.restaurants;
        const arcs = restaurants.length;
        const angle = (2 * Math.PI) / arcs;
        ctx.clearRect(0, 0, 300, 300);
        
        restaurants.forEach((res, i) => {
            ctx.beginPath();
            ctx.fillStyle = i % 2 === 0 ? '#1b4d3e' : '#222';
            ctx.moveTo(150, 150);
            ctx.arc(150, 150, 140, i * angle, (i + 1) * angle);
            ctx.lineTo(150, 150);
            ctx.fill();
            ctx.stroke();

            ctx.save();
            ctx.translate(150, 150);
            ctx.rotate(i * angle + angle / 2);
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 14px sans-serif';
            ctx.fillText(res, 60, 10);
            ctx.restore();
        });
    }

    function spinWheel() {
        alert("Đã sẵn sàng quay cho phòng: " + currentRoom);
    }

    render();
</script>

</body>
</html>
